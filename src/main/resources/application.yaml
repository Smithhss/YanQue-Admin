server:
  port: 8080
  servlet:
    context-path: /yq-admin

spring:
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}


  data:
    redis:
      lettuce:
        pool:
          max-active: 8            # 最大连接数
          max-idle: 8              # 最大空闲连接
          min-idle: 0              # 最小空闲连接
          max-wait: 2000ms         # 获取连接最大等待时间

mybatis:
  configuration:
    log-impl: org.apache.ibatis.logging.slf4j.Slf4jImpl
    map-underscore-to-camel-case: true
  mapper-locations: classpath*:/mapper/**/*.xml

yeepay:
  parent-merchant-no: ${YQ_YEEPAY_PARENT_MERCHANT_NO:10093003553}
  merchant-no: ${YQ_YEEPAY_MERCHANT_NO:10093003553}
  pay-success-notify-url: "http://10ro09314qm96.vicp.fun:8878/yq-admin/yop-callback/paySuccess"
  pay-success-return-url: "xxxxx"
  refund-notify-url: "http://10ro09314qm96.vicp.fun:8878/yq-admin/yop-callback/refund"

tos:
  endpoint: ${YQ_TOS_ENDPOINT:tos-cn-shanghai.volces.com}
  region: ${YQ_TOS_REGION:cn-shanghai}
  bucket: ${YQ_TOS_BUCKET:yq-admin-11-dev}
  access-key: ${YQ_TOS_ACCESS_KEY:}
  secret-key: ${YQ_TOS_SECRET_KEY:}

xxl:
  job:
    enabled: ${YQ_XXL_JOB_ENABLED:false}
    admin-addresses: ${YQ_XXL_JOB_ADMIN_ADDRESSES:http://115.190.191.2:9000/xxl-job-admin}
    access-token: ${YQ_XXL_JOB_ACCESS_TOKEN:default_token}
    app-name: ${YQ_XXL_JOB_APP_NAME:yanque-admin}
    address: ${YQ_XXL_JOB_ADDRESS:}
    ip: ${YQ_XXL_JOB_IP:}
    port: ${YQ_XXL_JOB_PORT:9999}
    log-path: ${YQ_XXL_JOB_LOG_PATH:/tmp/yanque-admin/xxl-job}
    log-retention-days: ${YQ_XXL_JOB_LOG_RETENTION_DAYS:30}

ai-chat:
  base-url: ${YQ_AI_CHAT_BASE_URL:http://127.0.0.1:8000}
  stream-path: ${YQ_AI_CHAT_STREAM_PATH:/api/ai-chat/stream}
  connect-timeout-seconds: ${YQ_AI_CHAT_CONNECT_TIMEOUT_SECONDS:3}
  request-timeout-seconds: ${YQ_AI_CHAT_REQUEST_TIMEOUT_SECONDS:120}
  history-limit: ${YQ_AI_CHAT_HISTORY_LIMIT:20}
