server:
  port: 8080
  servlet:
    context-path: /yq-admin

spring:
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}


  data:
    redis:
      lettuce:
        pool:
          max-active: 8            # 最大连接数
          max-idle: 8              # 最大空闲连接
          min-idle: 0              # 最小空闲连接
          max-wait: 2000ms         # 获取连接最大等待时间

mybatis:
  configuration:
    log-impl: org.apache.ibatis.logging.slf4j.Slf4jImpl
    map-underscore-to-camel-case: true
  mapper-locations: classpath*:/mapper/**/*.xml

yeepay:
  parent-merchant-no: ${YQ_YEEPAY_PARENT_MERCHANT_NO:10093003553}
  merchant-no: ${YQ_YEEPAY_MERCHANT_NO:10093003553}
  pay-success-notify-url: "http://10ro09314qm96.vicp.fun:8878/yq-admin/yop-callback/paySuccess"
  pay-success-return-url: "xxxxx"