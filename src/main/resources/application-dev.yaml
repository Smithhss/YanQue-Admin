spring:
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://${YQ_DB_HOST:127.0.0.1}:${YQ_DB_PORT:3306}/${YQ_DB_NAME:yanque}?useUnicode=true&characterEncoding=utf-8&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Shanghai
    username: ${YQ_DB_USERNAME:root}
    password: ${YQ_DB_PASSWORD:root}
    hikari:
      minimum-idle: 5
      maximum-pool-size: 20

  data:
    redis:
      host: ${YQ_REDIS_HOST:127.0.0.1}
      port: ${YQ_REDIS_PORT:6379}
      password: ${YQ_REDIS_PASSWORD:}
      database: ${YQ_REDIS_DATABASE:0}

logging:
  level:
    cn.yanque: INFO

payment:
  # 本地开发用 yeepay mock, 不依赖外网; 服务器 prod 用支付宝沙箱
  provider: ${YQ_PAYMENT_PROVIDER:yeepay}

yeepay:
  mode: ${YQ_YEEPAY_MODE:mock}
  mock-cashier-url: ${YQ_YEEPAY_MOCK_CASHIER_URL:http://127.0.0.1:5174/payment-return}

alipay:
  gateway-url: ${YQ_ALIPAY_GATEWAY_URL:https://openapi-sandbox.dl.alipaydev.com/gateway.do}
  app-id: ${YQ_ALIPAY_APP_ID:}
  app-private-key: ${YQ_ALIPAY_APP_PRIVATE_KEY:}
  alipay-public-key: ${YQ_ALIPAY_PUBLIC_KEY:}
  notify-url: ${YQ_ALIPAY_NOTIFY_URL:http://127.0.0.1:8080/yq-admin/alipay/notify}
  return-url: ${YQ_ALIPAY_RETURN_URL:http://127.0.0.1:8080/yq-admin/alipay/return}
  cashier-url: ${YQ_ALIPAY_CASHIER_URL:/yq-admin/alipay/cashier}
  page-pay-http-method: ${YQ_ALIPAY_PAGE_PAY_HTTP_METHOD:GET}
  return-url-enabled: ${YQ_ALIPAY_RETURN_URL_ENABLED:false}
